<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Resuming your form…</title>
  <style>
    body { margin: 0; font-family: -apple-system, sans-serif;
           display: flex; align-items: center; justify-content: center;
           height: 100vh; background: #f5f5f5; }
    .box { text-align: center; padding: 2rem; }
    .spinner { width: 36px; height: 36px; border: 3px solid #ddd;
               border-top-color: #111; border-radius: 50%;
               animation: spin .7s linear infinite; margin: 1rem auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #555; font-size: 15px; }
    .err { color: #c00; }
  </style>
</head>
<body>
<div class="box">
  <div class="spinner" id="sp"></div>
  <p id="msg">Resuming your form…</p>
</div>
<script>
  try {
    const hash = location.hash.slice(1);
    if (!hash) throw new Error('No data in URL.');

    const payload = JSON.parse(atob(hash));

    // Inject each localStorage key
    Object.entries(payload.ls).forEach(([k, v]) => {
      localStorage.setItem(k, typeof v === 'string' ? v : JSON.stringify(v));
    });

    // Redirect to the form
    window.location.replace(payload.url);

  } catch (e) {
    document.getElementById('sp').style.display = 'none';
    document.getElementById('msg').innerHTML =
      '<span class="err">Could not load resume data.<br>' + e.message + '</span>';
  }
</script>
</body>
</html>

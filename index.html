<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evnex Installation Survey</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f5f5f5; }

    #loading, #error, #resume {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    #error { display: none; color: #c00; text-align: center; }
    #error p { font-size: 0.875rem; color: #555; max-width: 400px; margin-top: 8px; }

    #resume {
      display: none;
      align-items: flex-start;
      justify-content: flex-start;
      padding: 32px 24px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 28px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    .card h1 { font-size: 1.1rem; margin-bottom: 4px; }
    .card .sub { font-size: 0.8rem; color: #888; margin-bottom: 20px; }

    .section-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #aaa;
      margin-bottom: 10px;
    }

    .uploads { list-style: none; margin-bottom: 24px; }
    .uploads li { margin-bottom: 8px; }
    .uploads a {
      font-size: 0.875rem;
      color: #007aff;
      word-break: break-all;
      text-decoration: none;
    }
    .uploads a:hover { text-decoration: underline; }

    .btn {
      display: block;
      width: 100%;
      padding: 13px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      text-align: center;
    }
    .btn:hover { background: #333; }

    iframe {
      display: none;
      width: 100%;
      height: 100vh;
      border: none;
    }

    #loading { color: #555; gap: 12px; }
  </style>
</head>
<body>

  <div id="loading">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2">
      <circle cx="12" cy="12" r="10"/>
      <path d="M12 6v6l4 2"/>
    </svg>
    <span>Loading your survey…</span>
  </div>

  <div id="error">
    <strong>Missing global ID</strong>
    <p>This page requires a <code>dealId</code> in the URL.<br>
    Example: <code>?dealId=ABC123&amp;installationType=tier2</code></p>
  </div>

  <div id="resume">
    <div class="card">
      <h1>Resume Survey</h1>
      <div class="sub" id="resume-sub"></div>

      <div id="uploads-section" style="display:none">
        <div class="section-title">Previously uploaded photos</div>
        <ul class="uploads" id="uploads-list"></ul>
      </div>

      <button class="btn" onclick="openForm()">Continue survey →</button>
    </div>
  </div>

  <iframe id="tally-frame" title="Evnex Installation Survey" allowfullscreen></iframe>

  <script>
    const API_KEY  = "tly-0rqbHxcjA00vVWBE3cWtzajCMiSFY5jE";
    const FORM_ID  = "KYMRok";
    const BASE_URL = `https://tally.so/r/${FORM_ID}`;

    const params           = new URLSearchParams(window.location.search);
    const dealId         = params.get("dealId");
    const installationType = params.get("installationType") || "tier1";

    const loading = document.getElementById("loading");
    const error   = document.getElementById("error");
    const resume  = document.getElementById("resume");
    const frame   = document.getElementById("tally-frame");

    let formUrl = BASE_URL;

    function openForm() {
      resume.style.display = "none";
      frame.style.display = "block";
      frame.src = formUrl;
    }

    async function tallyGet(path) {
      const target = `https://api.tally.so${path}`;
      const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(target)}`, {
        headers: { Authorization: `Bearer ${API_KEY}` }
      });
      if (!res.ok) throw new Error(`${res.status}`);
      return res.json();
    }

    async function fetchAndLoad() {
      if (!dealId) {
        loading.style.display = "none";
        error.style.display = "flex";
        return;
      }

      try {
        const [subData, formData] = await Promise.all([
          tallyGet(`/forms/${FORM_ID}/submissions?limit=100`),
          tallyGet(`/forms/${FORM_ID}`)
        ]);

        // questionId → title
        const titleMap = {};
        (formData.blocks || []).forEach(b => {
          if (b.type === "TITLE" && b.payload?.html) {
            titleMap[b.groupUuid] = b.payload.html.replace(/<[^>]+>/g, "");
          }
        });

        // uuid → dropdown option text
        const optionMap = {};
        (formData.blocks || []).forEach(b => {
          if (b.type === "DROPDOWN_OPTION" && b.payload?.text) {
            optionMap[b.uuid] = b.payload.text;
          }
        });

        // Find partial submission matching dealId
        const submissions = subData.submissions || [];
        let match = null;
        for (const sub of submissions) {
          if (sub.isCompleted) continue;
          for (const r of sub.responses || []) {
            const a = r.answer;
            if (typeof a === "string" && a === dealId) { match = sub; break; }
            if (typeof a === "object" && a !== null && Object.values(a).includes(dealId)) { match = sub; break; }
          }
          if (match) break;
        }

        if (!match) {
          // No prior answers — go straight to fresh form
          formUrl = `${BASE_URL}?${new URLSearchParams({ installationType, dealId })}`;
          loading.style.display = "none";
          openForm();
          return;
        }

        // Separate file uploads from other answers
        const prefill  = { installationType, dealId };
        const fileUrls = [];

        for (const r of match.responses || []) {
          let value = r.answer;

          // File upload answers come as arrays of objects with a `url` field
          if (Array.isArray(value) && value[0]?.url) {
            value.forEach(f => fileUrls.push(f.url));
            continue;
          }

          if (Array.isArray(value)) {
            value = value.map(v => optionMap[v] || v).join(", ");
          } else if (typeof value === "object" && value !== null) {
            Object.entries(value).forEach(([k, v]) => { if (k !== "dealId") prefill[k] = v; });
            continue;
          }

          const title = titleMap[r.questionId];
          if (value && title) {
            const key = title.toLowerCase().replace(/[^a-z0-9]+/g, "_").replace(/^_|_$/g, "");
            prefill[key] = value;
          }
        }

        formUrl = `${BASE_URL}?${new URLSearchParams(prefill)}`;

        // Show resume screen
        document.getElementById("resume-sub").textContent =
          `Continuing survey for ${dealId}`;

        if (fileUrls.length > 0) {
          const list = document.getElementById("uploads-list");
          fileUrls.forEach((url, i) => {
            const li = document.createElement("li");
            li.innerHTML = `<a href="${url}" target="_blank">Photo ${i + 1}: ${url}</a>`;
            list.appendChild(li);
          });
          document.getElementById("uploads-section").style.display = "block";
        }

        loading.style.display = "none";
        resume.style.display = "flex";

      } catch (err) {
        console.warn("API fetch failed, loading form without pre-fill:", err.message);
        formUrl = `${BASE_URL}?${new URLSearchParams({ installationType, dealId })}`;
        loading.style.display = "none";
        openForm();
      }
    }

    fetchAndLoad();
  </script>

</body>
</html>
